server:
  port: 8080

spring:
  application:
    name: api-gateway
  docker:
    compose:
      enabled: false
  threads:
    virtual:
      enabled: true
  data:
    redis:
      host: localhost
      port: 6379
  cloud:
    compatibility-verifier:
      enabled: false
    gateway:
      server:
        webflux:
          observability:
            enabled: true
          default-filters:
            - PreserveHostHeader
            - GatewayAuthentication
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                key-resolver: "#{@userKeyResolver}"
          routes:
            - id: auth-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/auth/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: authServiceCB
                    fallbackUri: forward:/fallback
              metadata:
                response-timeout: 15000
                connect-timeout: 15000
                sensitiveHeaders: ""
            - id: product-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/products,/api/products/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: productServiceCB
                    fallbackUri: forward:/fallback
              metadata:
                response-timeout: 15000
                connect-timeout: 15000
                sensitiveHeaders: ""
            - id: cart-service
              uri: http://localhost:8083
              predicates:
                - Path=/api/cart/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: cartServiceCB
                    fallbackUri: forward:/fallback
              metadata:
                response-timeout: 15000
                connect-timeout: 15000
                sensitiveHeaders: ""

resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 20
        failureRateThreshold: 50
        waitDurationInOpenState: 5s
        permittedNumberOfCallsInHalfOpenState: 5
        automaticTransitionFromOpenToHalfOpenEnabled: true
    instances:
      authServiceCB:
        baseConfig: default
      productServiceCB:
        baseConfig: default
      cartServiceCB:
        baseConfig: default
  timelimiter:
    configs:
      default:
        timeoutDuration: 15s
    instances:
      authServiceCB:
        baseConfig: default
      productServiceCB:
        baseConfig: default
      cartServiceCB:
        baseConfig: default

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
    urls:
      - name: Auth Service
        url: /api/auth/v3/api-docs
      - name: Product Service
        url: /api/products/v3/api-docs
      - name: Cart Service
        url: /api/cart/v3/api-docs

app:
  security:
    jwt:
      jwk-set-uri: "http://localhost:8081/api/auth/.well-known/jwks.json"

logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: DEBUG
    io.micrometer: DEBUG
    com.app: DEBUG

management:
  endpoint:
    gateway:
      enabled: true
