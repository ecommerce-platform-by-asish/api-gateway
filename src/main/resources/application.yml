server:
  port: 8080

spring:
  application:
    name: api-gateway
  docker:
    compose:
      enabled: true
      lifecycle-management: start-only
  cloud:
    gateway:
      server:
        webflux:
          default-filters:
            - GatewayAuthentication
          routes:
            - id: auth-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/auth/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 5
                    redis-rate-limiter.burstCapacity: 10
                    key-resolver: "#{@userKeyResolver}"
                - name: CircuitBreaker
                  args:
                    name: authServiceCB
                    fallbackUri: forward:/fallback
              metadata:
                response-timeout: 2000
                connect-timeout: 2000
                sensitiveHeaders: ""
            - id: product-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/products/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 10
                    redis-rate-limiter.burstCapacity: 20
                    key-resolver: "#{@userKeyResolver}"
                - name: CircuitBreaker
                  args:
                    name: productServiceCB
                    fallbackUri: forward:/fallback
              metadata:
                sensitiveHeaders: ""
            - id: cart-service
              uri: http://localhost:8083
              predicates:
                - Path=/api/cart/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 10
                    redis-rate-limiter.burstCapacity: 20
                    key-resolver: "#{@userKeyResolver}"
                - name: CircuitBreaker
                  args:
                    name: cartServiceCB
                    fallbackUri: forward:/fallback
              metadata:
                sensitiveHeaders: ""
  data:
    redis:
      host: localhost
      port: 6379

app:
  security:
    public-paths:
      - "/api/products/**"
    rsa:
      generate: false
    jwt:
      jwk-set-uri: "http://localhost:8081/api/auth/.well-known/jwks.json"

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
    urls:
      - name: Auth Service
        url: /api/auth/v3/api-docs
      - name: Product Service
        url: /api/products/v3/api-docs
      - name: Cart Service
        url: /api/cart/v3/api-docs
